<!DOCTYPE html>
<html>
<head>
<style>
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
}
.gallery-item {
  flex: 1 1 30%;
  text-align: center;
}
.gallery-item img {
  width: 100%;
  height: auto;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="gallery">
  <div class="gallery-item">
    <a href="https://example.com/1"><img src="image1.jpg" alt="Image 1"><p>Caption 1</p></a>
  </div>
  <div class="gallery-item">
    <a href="https://example.com/2"><img src="image2.jpg" alt="Image 2"><p>Caption 2</p></a>
  </div>
  <div class="gallery-item">
    <a href="https://example.com/3"><img src="image3.jpg" alt="Image 3"><p>Caption 3</p></a>
  </div>
</div>
</body>
</html>
